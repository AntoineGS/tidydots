version: 2

builds:
  - id: tidydots
    main: ./cmd/tidydots
    binary: tidydots
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - id: tidydots
    ids:
      - tidydots
    name_template: "tidydots_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"

release:
  github:
    owner: AntoineGS
    name: tidydots

homebrew_casks:
  - name: tidydots
    homepage: https://github.com/AntoineGS/tidydots
    description: Cross-platform dotfile management tool
    license: MIT
    repository:
      owner: AntoineGS
      name: homebrew-tidydots
      token: "{{ .Env.GORELEASER_TOKEN }}"
    hooks:
      post:
        # The released binaries are neither signed nor notarized, so without this
        # macOS quarantines them and the first run is blocked by Gatekeeper.
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/tidydots"]
          end
